  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Environment
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv
        uv sync --dev --upgrade

    - name: Determine Release Type
      id: release_type
      run: |
        $isPrerelease = python scripts/get_release_type.py
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to determine release type"
          exit 1
        }
        $channelName = python scripts/get_channel_name.py
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to determine channel name"
          exit 1
        }
        echo "prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
        echo "channel=$channelName" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Flet Build Windows
      run: |
        uv run flet build windows --yes -v --no-rich-output

    # - name: Upload Windows Artifact
    #   uses: actions/upload-artifact@v4.3.4
    #   with:
    #     name: windows-build-artifact
    #     path: build/windows
    #     if-no-files-found: warn
    #     overwrite: false

    - name: Archive Release
      uses: thedoctor0/zip-release@0.7.6
      with:
        type: 'zip'
        filename: 'cfms-cli-${{ github.ref }}-windows.zip'
        path: 'build/windows'
        exclusions: '*.git* /*node_modules/* .editorconfig'

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        files: |
          cfms-cli-${{ github.ref }}-windows.zip
        # overwrite_files: true
        generate_release_notes: true
        body: |
          <!-- channel: ${{ steps.release_type.outputs.channel }} -->
        prerelease: ${{ steps.release_type.outputs.prerelease == 'true' }}

