  #       overwrite: false

  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Environment
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv
        uv sync --upgrade

    - name: Determine Release Type
      id: release_type
      run: |
        isPrerelease=$(python scripts/get_release_type.py)
        if [ $? -ne 0 ]; then
          echo "Failed to determine release type"
          exit 1
        fi
        channelName=$(python scripts/get_channel_name.py)
        if [ $? -ne 0 ]; then
          echo "Failed to determine channel name"
          exit 1
        fi
        echo "prerelease=$isPrerelease" >> $GITHUB_OUTPUT
        echo "channel=$channelName" >> $GITHUB_OUTPUT

    - name: Extract keystore
      run: |
        mkdir -p ./build/flutter/android/app
        echo ${{ secrets.ENCODED_KEYSTORE }} | base64 -di > ./build/flutter/android/app/keystore.jks

    - name: Remove pillow dependency for mobile build
      run: |
        python scripts/remove_pillow_dependency.py

    - name: Flet Build APK
      run: |
        uv run flet build apk --yes -v --no-rich-output --android-signing-key-store keystore.jks --android-signing-key-alias key0 --android-signing-key-store-password ${{ secrets.FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD }} --android-signing-key-password ${{ secrets.FLET_ANDROID_SIGNING_KEY_PASSWORD }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4.3.4
      with:
        name: apk-build-artifact
        path: build/apk
        if-no-files-found: warn
        overwrite: false

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        files: |
          build/apk/${{ env.APP_NAME }}.apk
          build/apk/${{ env.APP_NAME }}.apk.sha1
        # overwrite_files: true
        # generate_release_notes: true
        prerelease: ${{ steps.release_type.outputs.prerelease == 'true' }}